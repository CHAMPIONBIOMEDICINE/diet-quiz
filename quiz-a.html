}

          <div class="products-label">包含產品</div>
          <div class="products-grid">${pkg.primary.products.map(pr => `<span class="product-chip">${pr}</span>`).join('')}</div>
          <div class="pkg-tip">${pkg.primary.tip}</div>
          <a class="cta-btn-primary" href="${pkg.primary.url}" target="_blank">了解 ${pkg.primary.name} →</a>
        </div>

        <div class="package-card">
          <div class="pkg-header">
            <span class="pkg-badge-alt">${pkg.alt.tag}</span>
            <span class="pkg-name">${pkg.alt.name}</span>
          </div>
          <div class="pkg-why-alt">${pkg.alt.why}</div>
          <div class="products-label">包含產品</div>
          <div class="products-grid">${pkg.alt.products.map(pr => `<span class="product-chip">${pr}</span>`).join('')}</div>
          <div class="pkg-tip">${pkg.alt.tip}</div>
          <a class="cta-btn-secondary" href="${pkg.alt.url}" target="_blank">了解 ${pkg.alt.name} →</a>
        </div>

        <div class="extra-tip"><strong>給你的話：</strong>${pkg.extra}</div>

        <button class="retry-btn" onclick="restart()">重新測驗</button>
      </div>
    `;
    return;
  }

  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);

  body.innerHTML = `
    <div class="progress-bar-wrap">
      <div class="progress-bar-track"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">第 ${current + 1} 題 / 共 ${questions.length} 題</div>
    </div>
    <div class="chapter-label">${q.chapter}</div>
    <div class="question-text">${q.q}</div>
    <div class="options">
      ${q.opts.map(o => `
        <button type="button" class="option-btn${answers[current] === o.l ? ' selected' : ''}" onclick="select('${o.l}')">
          <span class="option-letter">${o.l}</span>
          <span>${o.t}</span>
        </button>
      `).join('')}
    </div>
    <div class="nav-row">
      <button class="btn-back" onclick="go(-1)" ${current === 0 ? 'disabled' : ''}>上一題</button>
      <button class="btn-next" onclick="go(1)" ${answers[current] === null ? 'disabled' : ''}>${current === questions.length - 1 ? '查看我的套組推薦' : '下一題'}</button>
    </div>
  `;
}

function select(l) { answers[current] = l; render(); }
function go(d) {
  if (d === 1 && answers[current] === null) return;
  current = Math.max(0, current + d);
  render();
}
function restart() { current = 0; answers = new Array(10).fill(null); render(); }

render();
</script>
</body>
</html>
