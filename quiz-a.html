<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是哪種飲食星人？20題完整版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink:#E8497A; --pink-light:#FDE8EF; --pink-mid:#F0728F;
  --purple:#7B5EA7; --purple-light:#EDE8F7;
  --teal:#2BB5A0; --teal-light:#E0F5F2;
  --amber:#F0A500; --amber-light:#FEF3DC;
  --text:#1C1C2E; --text-sub:#5A5A78; --text-muted:#A0A0B8;
  --surface:#FFFFFF; --bg:#FDF5F8; --border:#F0E0E8;
  --radius:16px; --radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:2rem 1rem 4rem;color:var(--text);}
.card{width:100%;max-width:560px;background:var(--surface);border-radius:24px;box-shadow:0 4px 40px rgba(232,73,122,.10);overflow:hidden;}

/* Header ── 改淺色漸層 */
.card-header{
  background:linear-gradient(135deg,#F47DA8 0%,#E8608A 60%,#C47FD4 100%);
  padding:2rem 2rem 1.75rem;position:relative;overflow:hidden;
}
.card-header::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.10);}
.hdr-eyebrow{font-size:13px;font-weight:700;letter-spacing:.12em;color:rgba(255,255,255,.80);text-transform:uppercase;margin-bottom:10px;}
.hdr-title{font-size:28px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:8px;}
.hdr-sub{font-size:15px;color:rgba(255,255,255,.85);line-height:1.65;}
.hdr-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;}
.hdr-pill{font-size:13px;color:rgba(255,255,255,.92);background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);padding:4px 12px;border-radius:99px;}

/* Body */
.card-body{padding:1.75rem 2rem 2rem;}

/* Progress */
.prog-wrap{margin-bottom:1.5rem;}
.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.prog-chapter{font-size:12px;font-weight:700;color:var(--pink);letter-spacing:.05em;}
.prog-count{font-size:12px;color:var(--text-muted);}
.prog-track{height:6px;background:#F5E0E8;border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--pink-mid),var(--pink));transition:width .4s cubic-bezier(.4,0,.2,1);}

/* Question */
.q-text{font-size:16px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:1.1rem;}

/* Options */
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:flex-start;gap:12px;background:#FDF5F8;border:1.5px solid transparent;border-radius:var(--radius-sm);padding:11px 14px;cursor:pointer;font-size:14px;color:var(--text-sub);line-height:1.5;transition:all .18s;text-align:left;font-family:inherit;}
.opt:hover{border-color:var(--pink-mid);background:var(--pink-light);color:var(--pink);}
.opt.sel{border-color:var(--pink);background:var(--pink-light);color:#C4306A;}
.opt-letter{min-width:26px;height:26px;border-radius:50%;background:#fff;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-muted);flex-shrink:0;margin-top:1px;transition:all .18s;}
.opt.sel .opt-letter{background:var(--pink);border-color:var(--pink);color:#fff;}
.opt:hover .opt-letter{border-color:var(--pink-mid);color:var(--pink-mid);}

/* Nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.4rem;gap:10px;}
.btn-back{padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text-sub);transition:all .15s;font-family:inherit;}
.btn-back:hover{border-color:var(--pink-mid);color:var(--pink);}
.btn-back:disabled{opacity:.3;cursor:default;}
.btn-next{padding:10px 26px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;border:none;background:var(--pink);color:#fff;transition:all .18s;font-family:inherit;}
.btn-next:hover{background:#C4306A;transform:translateY(-1px);}
.btn-next:disabled{opacity:.4;cursor:default;transform:none;}

/* ── Result ── */
.persona-card{border-radius:var(--radius);padding:1.4rem;margin-bottom:1.25rem;position:relative;overflow:hidden;}
.persona-A{background:var(--purple-light);}
.persona-B{background:var(--teal-light);}
.persona-C{background:var(--pink-light);}
.persona-D{background:var(--amber-light);}
.persona-badge{display:inline-block;font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px;margin-bottom:10px;}
.persona-A .persona-badge{background:var(--purple);color:#fff;}
.persona-B .persona-badge{background:var(--teal);color:#fff;}
.persona-C .persona-badge{background:var(--pink);color:#fff;}
.persona-D .persona-badge{background:var(--amber);color:#fff;}
.persona-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px;}
.persona-desc{font-size:13px;color:var(--text-sub);line-height:1.75;margin-bottom:10px;}
.persona-kws{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.persona-kw{font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;background:rgba(255,255,255,.7);color:var(--text-sub);}
.persona-tip{font-size:13px;line-height:1.65;padding:10px 12px;background:rgba(255,255,255,.65);border-radius:8px;color:var(--text);}
.persona-tip strong{font-weight:700;}

/* 生活面向雷達 */
.radar-wrap{margin-bottom:1.25rem;}
.radar-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.score-lbl{font-size:12px;color:var(--text-sub);width:80px;flex-shrink:0;}
.score-track{flex:1;height:6px;background:#F0E0E8;border-radius:99px;overflow:hidden;}
.score-fill{height:100%;border-radius:99px;background:var(--pink-mid);}
.score-fill.hi{background:var(--pink);}
.score-val{font-size:12px;color:var(--text-muted);width:30px;text-align:right;}

/* Package */
.reco-divider{border:none;border-top:1.5px solid #F0E0E8;margin:1.25rem 0;}
.reco-eyebrow{font-size:11px;font-weight:700;color:var(--pink);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.reco-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:3px;}
.reco-sub{font-size:12px;color:var(--text-muted);margin-bottom:14px;}

.pkg-card{border:1.5px solid #F0E0E8;border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:10px;background:var(--surface);}
.pkg-card.top{border-color:var(--pink);background:var(--pink-light);}
.pkg-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.badge{font-size:10px;font-weight:700;letter-spacing:.04em;padding:3px 10px;border-radius:99px;}
.badge.top{background:var(--pink);color:#fff;}
.badge.alt{background:#F0E0E8;color:var(--pink);}
.pkg-name{font-size:15px;font-weight:700;color:var(--text);}
.pkg-why{font-size:13px;line-height:1.7;margin-bottom:10px;padding:9px 12px;border-radius:8px;}
.pkg-why.top{background:rgba(232,73,122,.08);color:#9B2060;}
.pkg-why.alt{background:#FDF5F8;color:var(--text-sub);}
.prod-lbl{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.prods{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.prod-chip{font-size:12px;color:var(--pink);background:rgba(232,73,122,.1);border:1px solid rgba(232,73,122,.18);border-radius:6px;padding:3px 10px;}
.cta{display:block;width:100%;padding:10px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;text-align:center;text-decoration:none;cursor:pointer;transition:all .18s;font-family:inherit;}
.cta.top{background:var(--pink);color:#fff;}
.cta.top:hover{background:#C4306A;}
.cta.alt{background:transparent;color:var(--pink);border:1.5px solid #F0C0D0;}
.cta.alt:hover{background:var(--pink-light);}

.share-row{display:flex;gap:8px;margin-top:12px;}
.share-btn{flex:1;padding:10px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text-sub);font-family:inherit;transition:all .15s;}
.share-btn.line{background:#06C755;color:#fff;border-color:#06C755;}
.share-btn.line:hover{background:#05a848;}
.share-btn.copy:hover{border-color:var(--pink-mid);color:var(--pink);}

.legal{font-size:11px;color:var(--text-muted);line-height:1.65;margin-top:12px;padding:10px 13px;background:#FDF5F8;border-radius:8px;border-left:3px solid #F0C0D0;}
.retry-btn{width:100%;padding:10px;background:transparent;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;color:var(--text-muted);cursor:pointer;margin-top:8px;font-family:inherit;transition:all .15s;}
.retry-btn:hover{border-color:var(--pink-mid);color:var(--pink);}
@media(max-width:480px){.card-body{padding:1.4rem 1.25rem 1.75rem;}.card-header{padding:1.5rem 1.25rem 1.4rem;}}
</style>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script

};

const PKG_MAP = {A:['dailyA','slimA'],B:['dailyB','beauty'],C:['beauty','slimA'],D:['slimB','dailyA']};

const SCORE_DEF = {
  daily_habit:{label:"日常補充習慣",max:5},
  diet_quality:{label:"飲食品質意識",max:5},
  lifestyle_pace:{label:"生活步調穩定度",max:5},
  social_eating:{label:"飲食社交豐富度",max:5},
  self_care:{label:"日常自我照顧意識",max:5},
};

function calcScores(top,cnt){
  const base={A:{daily_habit:2,diet_quality:3,lifestyle_pace:2,social_eating:3,self_care:2},B:{daily_habit:5,diet_quality:5,lifestyle_pace:5,social_eating:3,self_care:4},C:{daily_habit:2,diet_quality:3,lifestyle_pace:3,social_eating:5,self_care:3},D:{daily_habit:2,diet_quality:2,lifestyle_pace:4,social_eating:2,self_care:2}}[top];
  if(ans[19]==='B') base.daily_habit=Math.min(5,base.daily_habit+1);
  if(ans[19]==='A') base.self_care=Math.min(5,base.self_care+1);
  return base;
}

let cur=0,ans=new Array(QS.length).fill(null);

function getTop(){const cnt={A:0,B:0,C:0,D:0};ans.forEach(a=>{if(a)cnt[a]++;});return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0];}

function render(){
  const body=document.getElementById('body');
  if(cur===QS.length){
    const top=getTop();
    const persona=PERSONAS[top];
    const cnt={A:0,B:0,C:0,D:0};
    ans.forEach(a=>{if(a)cnt[a]++;});
    const [k1,k2]=PKG_MAP[top];
    const pk1=PKGS[k1],pk2=PKGS[k2];
    const sc=calcScores(top,cnt);
    const scHTML=Object.entries(SCORE_DEF).map(([k,def])=>{const v=sc[k],pct=Math.round(v/def.max*100);return `<div class="score-row"><span class="score-lbl">${def.label}</span><div class="score-track"><div class="score-fill${pct>=70?' hi':''}" style="width:${pct}%"></div></div><span class="score-val">${pct}%</span></div>`;}).join('');
    body.innerHTML=`
      <div class="persona-card persona-${top}">
        <span class="persona-badge">${persona.label}</span>
        <div class="persona-title">${persona.title}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">${Object.entries(cnt).map(([l,n])=>`${l}：${n}題`).join('　')}</div>
        <div class="persona-desc">${persona.desc}</div>
        <div class="persona-kws">${persona.kws.map(k=>`<span class="persona-kw">${k}</span>`).join('')}</div>
        <div class="persona-tip"><strong>給你的小提醒：</strong>${persona.tip}</div>
      </div>
      <div class="radar-wrap">
        <div class="radar-title">你的日常生活面向分析</div>
        ${scHTML}
      </div>
      <hr class="reco-divider">
      <div class="reco-eyebrow">專屬推薦</div>
      <div class="reco-title">為你配對的保健套組</div>
      <div class="reco-sub">依據你的飲食人格與生活習慣所配對，僅供參考</div>
      <div class="pkg-card top">
        <div class="pkg-hdr"><span class="badge top">主要推薦</span><span class="pkg-name">${pk1.name}</span></div>
        <div class="pkg-why top">${pk1.why[top]}</div>
        <div class="prod-lbl">包含產品</div>
        <div class="prods">${pk1.prods.map(x=>`<span class="prod-chip">${x}</span>`).join('')}</div>
        <a class="cta top" href="${pk1.url}" target="_blank">了解 ${pk1.name} →</a>
      </div>
      <div class="pkg-card">
        <div class="pkg-hdr"><span class="badge alt">次要推薦</span><span class="pkg-name">${pk2.name}</span></div>
        <div class="pkg-why alt">${pk2.why_alt}</div>
        <div class="prod-lbl">包含產品</div>
        <div class="prods">${pk2.prods.map(x=>`<span class="prod-chip">${x}</span>`).join('')}</div>
        <a class="cta alt" href="${pk2.url}" target="_blank">了解 ${pk2.name} →</a>
      </div>
      <div class="share-row">
        <button class="share-btn line" onclick="shareLine()">分享給朋友</button>
        <button class="share-btn copy" onclick="copyLink()">複製連結</button>
      </div>
      <div class="legal">本測驗結果及套組推薦，係依據填答者自填之生活習慣與日常行為偏好所產生，僅供消費者參考，不代表任何醫療建議、診斷或療效宣稱。保健食品非藥品，無法預防、治療或減輕任何疾病。如有健康問題，請諮詢專業醫師或營養師。</div>
      <button class="retry-btn" onclick="restart()">重新測驗</button>`;
    return;
  }
  const q=QS[cur];
  const pct=Math.round(cur/QS.length*100);
  body.innerHTML=`
    <div class="prog-wrap">
      <div class="prog-meta">
        <span class="prog-chapter">${q.ch}</span>
        <span class="prog-count">${cur+1} / ${QS.length}</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-text">${q.q}</div>
    <div class="opts">
      ${q.opts.map(o=>`<button type="button" class="opt${ans[cur]===o.l?' sel':''}" onclick="pick('${o.l}')"><span class="opt-letter">${o.l}</span><span>${o.t}</span></button>`).join('')}
    </div>
    <div class="nav">
      <button class="btn-back" onclick="go(-1)"${cur===0?' disabled':''}>上一題</button>
      <button class="btn-next" onclick="go(1)"${ans[cur]===null?' disabled':''}>${cur===QS.length-1?'看我的結果 →':'下一題 →'}</button>
    </div>`;
}

const API_URL = 'https://web-production-fb6ac.up.railway.app/api/quiz/result';

function pick(l) { ans[cur] = l; render(); }

async function go(d) {
  if (d === 1 && ans[cur] === null) return;
  cur = Math.max(0, cur + d);
  if (cur === QS.length) {
    const top = getTop();
    localStorage.setItem('champion_quiz_a_ans', JSON.stringify(ans));
    localStorage.setItem('champion_quiz_a_result', top);
    if (typeof liff !== 'undefined' && liff.isLoggedIn()) {
      try {
        await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${liff.getAccessToken()}`
          },
          body: JSON.stringify({ quiz_group: 'A', quiz_result: top })
        });
      } catch (e) { console.error('API Error', e); }
    }
  }
  render();
}

function restart() {
  cur = 0;
  ans = new Array(QS.length).fill(null);
  localStorage.removeItem('champion_quiz_a_result');
  localStorage.removeItem('champion_quiz_a_ans');
  render();
}

function shareLine() {
  window.open('https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(location.href), '_blank');
}

function copyLink() {
  navigator.clipboard && navigator.clipboard.writeText(location.href).then(() => alert('連結已複製！'));
}

async function initApp() {
  try { await liff.init({ liffId: '2009765744-8CaFB1hT' }); } catch (e) { console.error(e); }
  const saved = localStorage.getItem('champion_quiz_a_result');
  if (saved) {
    cur = QS.length;
    ans = JSON.parse(localStorage.getItem('champion_quiz_a_ans')) || ans;
  }
  render();
}

initApp();
</script>
