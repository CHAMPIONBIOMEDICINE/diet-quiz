*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",sans-serif;background:#f7f6fb;min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem;color:#222;}
.wrap{width:100%;max-width:560px;}

.hdr{margin-bottom:1.25rem;}

.hdr-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}

.prog-fill{height:100%;background:#534AB7;border-radius:99px;transition:width .3s ease;}
.prog-meta{font-size:12px;color:#aaa;margin-top:5px;display:flex;justify-content:space-between;}

.sec-chip{display:inline-block;font-size:11px;font-weight:600;color:#534AB7;background:#EEEDFE;padding:3px 10px;border-radius:99px;margin-bottom:9px;}
.q-text{font-size:16px;font-weight:700;color:#111;line-height:1.5;margin-bottom:4px;}
.q-hint{font-size:12px;color:#aaa;margin-bottom:1rem;}

.opts{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid #e8e6f5;border-radius:12px;padding:12px 14px;cursor:pointer;font-size:14px;color:#333;line-height:1.45;transition:border-color .15s,background .15s;text-align:left;width:100%;font-family:inherit;}
.opt:hover{border-color:#AFA9EC;background:#faf9ff;}
.opt.sel{border:2px solid #534AB7;background:#EEEDFE;color:#3C3489;}

.opt-dot{width:20px;height:20px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.opt.sel .opt-dot{background:#534AB7;border-color:#534AB7;}
.opt.sel .opt-dot::after{content:'';width:7px;height:7px;border-radius:50%;background:#fff;}

.opt-sq{width:20px;height:20px;border-radius:5px;border:1.5px solid #ccc;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;}
.opt.sel .opt-sq{background:#534AB7;border-color:#534AB7;color:#fff;font-weight:700;}

.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;gap:10px;}
.btn-back{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#555;font-family:inherit;}
.btn-back:hover{background:#f5f5f5;}
.btn-back:disabled{opacity:.3;cursor:default;}
.btn-next{padding:10px 26px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:#534AB7;color:#fff;font-family:inherit;transition:background .15s;}
.btn-next:hover{background:#3C3489;}
.btn-next:disabled{opacity:.4;cursor:default;}

.hero-score{display:flex;align-items:center;gap:16px;background:#fff;border:1.5px solid #e8e6f5;border-radius:14px;padding:1rem 1.1rem;margin-bottom:1.1rem;}

.profile-title{font-size:13px;font-weight:700;color:#111;margin-bottom:4px;}

.score-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}

.score-total .big{font-size:22px;color:#534AB7;}
.score-total .unit{font-size:12px;color:#777;font-weight:500;}

.divider{border:none;border-top:1.5px solid #eee;margin:1.25rem 0;}
.reco-title{font-size:15px;font-weight:700;color:#111;margin-bottom:4px;}
.reco-sub{font-size:12px;color:#aaa;margin-bottom:14px;}

.analysis-box .good{color:#1A8275;font-weight:700;}
.analysis-box .low{color:#C0392B;font-weight:700;}

.advice-block{margin-bottom:14px;}
.advice-head{font-size:14px;font-weight:700;margin-bottom:8px;padding:8px 12px;border-radius:8px;}
.advice-head.diet{background:#FEF3DC;color:#9A6B00;}
.advice-head.life{background:#E0F5F2;color:#1A8275;}
.advice-list{list-style:none;display:flex;flex-direction:column;gap:8px;}
.advice-list li{font-size:13px;line-height:1.7;color:#555;padding:10px 12px 10px 30px;background:#f7f6fb;border-radius:8px;position:relative;}
.advice-list li::before{content:'';position:absolute;left:13px;top:16px;width:7px;height:7px;border-radius:50%;background:#534AB7;}
.advice-list li .tag{font-size:11px;color:#534AB7;font-weight:700;margin-right:4px;}

.summary-card{margin-top:18px;border-radius:14px;padding:1.1rem 1.25rem;background:linear-gradient(135deg,#EEEDFE,#F3EAFA);border:1.5px solid #ddd9f5;}
.summary-head{font-size:14px;font-weight:700;color:#534AB7;margin-bottom:8px;}
.summary-body{font-size:13px;line-height:1.85;color:#555;}
.summary-body strong{color:#111;}

.share-row{display:flex;gap:8px;margin-top:16px;}
.share-btn{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:1.5px solid #ddd;background:#fff;color:#555;transition:background .15s;}
.share-btn.line{background:#06C755;color:#fff;border-color:#06C755;}
.share-btn.line:hover{background:#05a848;}
.share-btn.copy:hover{background:#f5f5f5;}

.legal{font-size:11px;color:#aaa;line-height:1.65;margin-top:12px;padding:10px 13px;background:#f7f6fb;border-radius:8px;border-left:3px solid #ddd9f5;}
.retry-btn{width:100%;padding:10px;background:#fff;border:1.5px solid #ddd;border-radius:10px;font-size:13px;color:#aaa;cursor:pointer;margin-top:8px;font-family:inherit;}
.retry-btn:hover{background:#f5f5f5;}

    ["益生菌",   {gut:2,slim:0,energy:0,sleep:0,beauty:0,daily:1}],
    ["維他命",   {gut:0,slim:0,energy:2,sleep:0,beauty:0,daily:1}],
    ["膠原蛋白", {gut:0,slim:0,energy:0,sleep:0,beauty:2,daily:1}],
    ["魚油",     {gut:0,slim:0,energy:1,sleep:1,beauty:0,daily:1}],
    ["酵素",     {gut:2,slim:1,energy:0,sleep:0,beauty:0,daily:1}],
    ["蛋白粉",   {gut:0,slim:2,energy:1,sleep:0,beauty:0,daily:1}],
    ["沒吃過",   {gut:0,slim:0,energy:0,sleep:0,beauty:0,daily:0}],
  ]},
  {s:4,multi:true,q:"Q24. 最希望改善什麼？",hint:"可複選",opts:[
    ["幫助消化",                   {gut:3,slim:0,energy:0,sleep:0,beauty:0,daily:0}],
    ["改變細菌叢生態",             {gut:3,slim:0,energy:0,sleep:0,beauty:0,daily:0}],
    ["促進新陳代謝、調節生理機能", {gut:0,slim:3,energy:2,sleep:0,beauty:0,daily:1}],
    ["好氣色好狀態",               {gut:0,slim:0,energy:0,sleep:0,beauty:3,daily:0}],
    ["精神體力",                   {gut:0,slim:0,energy:3,sleep:2,beauty:0,daily:1}],
    ["營養補給、維持健康狀態",     {gut:1,slim:0,energy:1,sleep:0,beauty:1,daily:2}],
  ]},
  {s:4,multi:false,q:"Q25. 考慮長期維持健康的營養計畫嗎？",opts:[
    ["很有興趣",   {gut:0,slim:0,energy:0,sleep:0,beauty:0,daily:0}],
    ["考慮看看",   {gut:0,slim:0,energy:0,sleep:0,beauty:0,daily:0}],
    ["暫時不需要", {gut:0,slim:0,energy:0,sleep:0,beauty:0,daily:0}],
  ]},
];

/* 四大計分領域（每題只屬一個領域；分數越高＝狀態越好）。第5章「保健需求」為參考題、不計分 */
const AREA_DEF=[
  {key:0,label:"飲食習慣",pts:33},
  {key:1,label:"睡眠作息",pts:29},
  {key:2,label:"運動代謝",pts:24},
  {key:3,label:"氣色狀態",pts:14},
];
const REV=new Set([18,19,20]); // Q19、Q20、Q21 選項由差到好，需反向計分

/* 各領域對應的「飲食＋生活」建議（合規：僅生活與飲食參考，無療效、無產品） */
const AREA_ADVICE={
  0:{diet:"三餐定時，增加蔬果與全穀比例，減少外食、油炸與含糖飲料，並補足每日水分。",
     life:"固定用餐時間、細嚼慢嚥，盡量避免消夜，建立規律的飲食節奏。"},
  1:{diet:"晚餐七分飽、睡前 3 小時不再進食，並避免咖啡因與酒精影響入睡。",
     life:"固定就寢時間、睡前 30 分鐘遠離螢幕，用伸展或深呼吸放鬆，並適度紓解壓力。"},
  2:{diet:"每餐先吃蔬菜與優質蛋白（豆腐、雞蛋、魚肉），減少精緻澱粉與含糖飲料。",
     life:"每週安排 3 次、每次 30 分鐘運動，搭配規律補水與適度肌力訓練。"},
  3:{diet:"多吃含維生素 C、E 與優質蛋白的食物（莓果、彩椒、堅果、魚肉），並補足水分。",
     life:"充足睡眠＋防曬＋規律作息，是維持好氣色最實在的方法。"}
};

// 推薦綁定：讀取 ?ref=，只存第一次（A→B→C 鏈條中 A 的 ref 不被 B 覆蓋）
const urlRef = new URLSearchParams(window.location.search).get('ref');
if (urlRef && !localStorage.getItem('quiz_original_ref')) {
  localStorage.setItem('quiz_original_ref', urlRef);
}

let cur=0;
let quizAdsEnabled=true; // 保留原 B 問卷的經銷廣告狀態查詢流程
let ans=QS.map(q=>q.multi?[]:null);

/* 單題得分：越高越好。第5章與複選題不計分；Q19–21 反向計分 */
function qScore(i){
  const q=QS[i];
  if(q.s===4||q.multi) return null;
  if(ans[i]===null) return null;
  const n=q.opts.length;
  return REV.has(i) ? ans[i] : (n-1-ans[i]);
}

/* 各領域：原始得分、滿分、百分比，以及換算百分制總分 */
function areaScores(){
  const raw={},rawMax={};
  AREA_DEF.forEach(a=>{raw[a.key]=0;rawMax[a.key]=0;});
  for(let i=0;i<QS.length;i++){
    const q=QS[i];
    if(q.s===4||q.multi) continue;
    rawMax[q.s]+=(q.opts.length-1);
    const s=qScore(i); if(s!==null) raw[q.s]+=s;
  }
  const score={},pct={}; let total=0;
  AREA_DEF.forEach(a=>{
    const p = rawMax[a.key]>0 ? raw[a.key]/rawMax[a.key] : 0;
    score[a.key]=Math.round(p*a.pts);   // 換算成該領域配分
    pct[a.key]=Math.round(p*100);       // 領域達成率（給長條與分析用）
    total+=score[a.key];
  });
  return {raw,rawMax,score,pct,total};
}

/* 狀況分析（高分讚賞、低分點名）＋對應較弱領域的 飲食3 + 生活3 建議 */
function buildAdvice(pct){
  const entries=AREA_DEF.map(a=>({key:a.key,label:a.label,pct:pct[a.key]}));
  const byHigh=[...entries].sort((a,b)=>b.pct-a.pct);
  const byLow =[...entries].sort((a,b)=>a.pct-b.pct);
  const high=byHigh[0];
  const second=byHigh[1];

  const adviceAreas=byLow.filter(e=>e.key!==high.key).slice(0,3);
  const realLow=adviceAreas.filter(e=>e.pct<high.pct && e.pct<80);

  let praise=`你在「<span class="good">${high.label}</span>」的狀態最好（${high.pct} 分）`;
  if(second && second.pct===high.pct){ praise+=`，「<span class="good">${second.label}</span>」也同樣不錯`; }
  praise+=`，這是你目前的優勢，請繼續保持！`;

  let lowSentence;
  if(realLow.length){
    lowSentence=`相對來說，${realLow.map(e=>`<span class="low">${e.label}</span>`).join('、')} 的分數偏低，是目前最值得優先照顧的方向。`;
  }else{
    lowSentence=`其他領域也都維持得不錯，沒有明顯弱項；以下針對分數相對較低的幾項，幫你再加分。`;
  }

  const analysisHTML=`<strong>狀況分析：</strong>從你的作答來看，${praise}${lowSentence}下面的 <strong>飲食建議 3 點</strong> 與 <strong>生活建議 3 點</strong>，正是依這幾個領域整理的：`;

  const dietTips=adviceAreas.map(e=>`<li><span class="tag">［${e.label}］</span>${AREA_ADVICE[e.key].diet}</li>`).join('');
  const lifeTips=adviceAreas.map(e=>`<li><span class="tag">［${e.label}］</span>${AREA_ADVICE[e.key].life}</li>`).join('');

  return {analysisHTML, dietTips, lifeTips, highLabel:high.label, highPct:high.pct, lowLabels:realLow.map(e=>e.label)};
}

function isReady(){
  const q=QS[cur];
  if(q.multi) return ans[cur].length>0;
  return ans[cur]!==null;
}

function render(){
  const body=document.getElementById('body');

  if(cur===QS.length){
    const A=areaScores();
    const total=A.total;
    const {analysisHTML, dietTips, lifeTips, highLabel, highPct, lowLabels}=buildAdvice(A.pct);

    const scHTML=AREA_DEF.map(a=>{
      const v=A.pct[a.key];
      return `<div class="score-row">
        <span class="score-lbl">${a.label}</span>
        <div class="score-track"><div class="score-fill${v>=70?' hi':''}" style="width:${v}%"></div></div>
        <span class="score-val">${A.score[a.key]}/${a.pts}</span>
      </div>`;
    }).join('');

    const _r=44,_C=2*Math.PI*_r,_off=_C*(1-total/100);
    const ringHTML=`<svg width="104" height="104" viewBox="0 0 104 104" class="score-ring" aria-label="綜合總分 ${total} 分">
      <circle cx="52" cy="52" r="${_r}" fill="none" stroke="#e8e6f5" stroke-width="10"/>
      <circle cx="52" cy="52" r="${_r}" fill="none" stroke="#534AB7" stroke-width="10" stroke-linecap="round" stroke-dasharray="${_C.toFixed(1)}" stroke-dashoffset="${_off.toFixed(1)}" transform="rotate(-90 52 52)"/>
      <text x="52" y="50" text-anchor="middle" font-size="26" font-weight="700" fill="#111">${total}</text>
      <text x="52" y="68" text-anchor="middle" font-size="10" fill="#aaa">/ 100 分</text>
    </svg>`;

    const summaryHTML=`你的綜合狀態分數為 <strong>${total} / 100</strong>。目前表現最好的是「<strong>${highLabel}</strong>」（${highPct} 分）${lowLabels.length?`，最需要優先照顧的是「<strong>${lowLabels.join('、')}</strong>」`:`，整體相當均衡`}。照著上面的飲食與生活建議慢慢調整，維持優勢、補強較弱的面向，狀態就會越來越好！`;

    body.innerHTML=`
      <p class="r-intro">根據你的 25 題作答，每題依所屬領域計分（分數越高代表該領域狀態越好）：</p>

      <div class="hero-score">
        <div class="ht">
          <h2>你的綜合狀態分數</h2>
          <p>由四大領域得分換算成百分制，分數越高代表整體狀態越好。</p>
        </div>
        ${ringHTML}
      </div>

      <div class="profile-title">📊 四大領域得分（數字＝得分／該領域配分）</div>
      <div class="profile-sub">領域配分：飲食 33・睡眠 29・運動 24・氣色 14，加總 100；長條為達成率</div>
      ${scHTML}
      <div class="score-total"><span>綜合總分（四領域相加）</span><span><span class="big">${total}</span> <span class="unit">/ 100 分</span></span></div>
      <div class="profile-sub" style="margin-top:8px;">※ 第 5 章「保健需求」（Q22–Q25）屬意願/習慣調查，不納入評分。</div>

      <hr class="divider">
      <div class="reco-title">給你的飲食 &amp; 生活建議</div>
      <div class="reco-sub">依你的各面向狀態分析整理，無關任何商品</div>

      <div class="analysis-box">${analysisHTML}</div>

      <div class="advice-block">
        <div class="advice-head diet">🥗 飲食建議・3 點</div>
        <ul class="advice-list">${dietTips}</ul>
      </div>

      <div class="advice-block">
        <div class="advice-head life">🌱 生活建議・3 點</div>
        <ul class="advice-list">${lifeTips}</ul>
      </div>

      <div class="summary-card">
        <div class="summary-head">📝 總結</div>
        <div class="summary-body">${summaryHTML}</div>
      </div>

      <div class="share-row">
        <button class="share-btn line" onclick="shareToLine()">分享給朋友</button>
        <button class="share-btn copy" onclick="copyLink()">複製連結</button>
      </div>

      <div class="legal">本評估結果與建議，係依據你自填的生活習慣與飲食偏好所產生，僅供日常生活與飲食參考，非醫療建議，不可取代專業醫療診斷、治療或營養處方。若有特殊健康狀況、慢性疾病或特定飲食需求，請諮詢醫師或營養師。</div>
      <button class="retry-btn" onclick="restart()">重新填寫</button>
    `;
    return;
  }

  const q=QS[cur];
  const pct=Math.round(cur/QS.length*100);

  const optsHtml=q.opts.map((o,i)=>{
    const isSel=q.multi?ans[cur].includes(i):ans[cur]===i;
    const icon=q.multi
      ?`<span class="opt-sq">${isSel?'✓':''}</span>`
      :`<span class="opt-dot"></span>`;
    return`<button type="button" class="opt${isSel?' sel':''}" onclick="pick(${i})">${icon}<span>${o[0]}</span></button>`;
  }).join('');

  body.innerHTML=`
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-meta"><span>${secLabel(q)}</span><span>${cur+1} / ${QS.length}</span></div>
    </div>
    <div class="sec-chip">${secLabel(q)}</div>
    <div class="q-text">${q.q}</div>
    ${q.hint?`<div class="q-hint">${q.hint}</div>`:''}
    <div class="opts">${optsHtml}</div>
    <div class="nav">
      <button class="btn-back" onclick="go(-1)" ${cur===0?'disabled':''}>上一題</button>
      <button class="btn-next" onclick="go(1)" ${isReady()?'':'disabled'}>${cur===QS.length-1?'查看結果':'下一題'}</button>
    </div>`;
}

const API_URL = 'https://web-production-fb6ac.up.railway.app/api/quiz/result';

function pick(i){
  const q=QS[cur];
  if(q.multi){
    const noneIdx=q.opts.findIndex(o=>o[0]==='沒吃過');
    if(i===noneIdx){
      ans[cur]=[noneIdx];
    } else {
      ans[cur]=ans[cur].filter(x=>x!==noneIdx);
      if(ans[cur].includes(i)) ans[cur]=ans[cur].filter(x=>x!==i);
      else ans[cur].push(i);
    }
  } else {
    ans[cur]=i;
  }
  render();
}

async function go(d) {
  if (d === 1 && !isReady()) return;
  cur = Math.max(0, cur + d);
  if (cur === QS.length) {
    const A = areaScores();
    const result = getPrimaryResult(A.pct);
    localStorage.setItem('champion_quiz_b_ans', JSON.stringify(ans));
    localStorage.setItem('champion_quiz_b_result', result);
    if (typeof liff !== 'undefined' && liff.isLoggedIn()) {
      try {
        await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${liff.getAccessToken()}`
          },
          body: JSON.stringify({ quiz_group: 'B', quiz_result: result })
        });
      } catch (e) { console.error('API Error', e); }
    }
  }
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function getPrimaryResult(pct) {
  return AREA_DEF.map(a=>a.key).sort((a,b)=>pct[a]-pct[b])[0];
}

function restart() {
  cur = 0;
  ans = QS.map(q => q.multi ? [] : null);
  localStorage.removeItem('champion_quiz_b_result');
  localStorage.removeItem('champion_quiz_b_ans');
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

async function getShareUrl() {
  const originalRef = localStorage.getItem('quiz_original_ref');
  let myUid = '';
  if (!originalRef && typeof liff !== 'undefined' && liff.isLoggedIn()) {
    const profile = await liff.getProfile();
    myUid = profile.userId;
  }
  const refToShare = originalRef || myUid;
  const baseUrl = 'https://championbiomedicine.github.io/diet-quiz/';
  return refToShare ? `${baseUrl}?ref=${refToShare}` : baseUrl;
}

async function shareToLine() {
  const shareUrl = await getShareUrl();
  if (typeof liff !== 'undefined' && liff.isInClient()) {
    liff.shareTargetPicker([{ type: 'text', text: `我剛做完健康問卷，你也來試試看！\n${shareUrl}` }]);
  } else {
    window.open('https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(shareUrl), '_blank');
  }
}

async function copyLink() {
  const shareUrl = await getShareUrl();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(shareUrl).then(() => alert('連結已複製！'));
  }
}

// 依分享者 ref（優先 localStorage，A→B→C 串接/還原時 URL 可能沒 ref）查經銷廣告開關
async function fetchAdsStatus() {
  try {
    const ref = localStorage.getItem('quiz_original_ref')
      || new URLSearchParams(window.location.search).get('ref') || '';
    let uid = '';
    if (typeof liff !== 'undefined' && liff.isLoggedIn()) {
      try { uid = (await liff.getProfile()).userId; } catch (e) {}
    }
    if (!ref && !uid) return;
    const r = await fetch('https://web-production-fb6ac.up.railway.app/api/quiz/ads-status?ref='
      + encodeURIComponent(ref) + '&user_id=' + encodeURIComponent(uid));
    const d = await r.json();
    quizAdsEnabled = d.ads_enabled !== false;
  } catch (e) { console.error('ads-status failed, default on', e); }
}

async function initApp() {
  try { await liff.init({ liffId: '2009765744-8CaFB1hT' }); } catch (e) { console.error(e); }

  const RESET = true; // 是否每次進來都重做測驗
  if (RESET) {
    localStorage.removeItem('champion_quiz_b_result');
    localStorage.removeItem('champion_quiz_b_ans');
  }
  
  const saved = localStorage.getItem('champion_quiz_b_result');
  if (saved) {
    cur = QS.length;
    ans = JSON.parse(localStorage.getItem('champion_quiz_b_ans')) || ans;
    await fetchAdsStatus();
  } else {
    fetchAdsStatus();
  }
  render();
}
initApp();

</script>
</body>
</html>
