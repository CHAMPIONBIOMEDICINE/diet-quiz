function score(){
  let gut=0,slim=0,energy=0,sleep=0,beauty=0,meta=0;
  const cats=[
    'gut','gut','gut','gut','slim',
    'slim','slim','slim','slim','slim',
    'gut','gut','energy','energy','energy',
    'sleep','sleep','sleep','sleep','sleep',
    'meta','meta','meta','meta','meta',
    'beauty','beauty','beauty','beauty','beauty',
    null,null,null,null,null
  ];
  for(let i=0;i<QS.length;i++){
    if(ans[i]===null) continue;
    const v=QS[i].opts[ans[i]][1];
    const c=cats[i];
    if(c==='gut') gut+=v;
    else if(c==='slim') slim+=v;
    else if(c==='energy') energy+=v;
    else if(c==='sleep') sleep+=v;
    else if(c==='beauty') beauty+=v;
    else if(c==='meta') meta+=v;
    else{gut+=v*0.3;slim+=v*0.3;energy+=v*0.15;sleep+=v*0.1;beauty+=v*0.1;meta+=v*0.05;}
  }
  return {gut,slim,energy,sleep,beauty,meta};
}

function recommend(sc){
  const{gut,slim,energy,sleep,beauty,meta}=sc;
  const ps={
    dailyA:gut*1.5+energy*1.2+sleep*0.5,
    dailyB:gut*1.2+energy*1.0+meta*1.3,
    slimA:slim*1.5+meta*1.3+energy*0.4,
    slimB:slim*1.3+gut*1.2+meta*1.0,
    beauty:beauty*2.0+sleep*0.8+energy*0.3
  };
  const sorted=Object.entries(ps).sort((a,b)=>b[1]-a[1]);
  return[sorted[0][0],sorted[1][0]];
}

function render(){
  const body=document.getElementById('body');
  if(cur===QS.length){
    const sc=score();
    const[p,alt]=recommend(sc);
    const bars=Object.entries(sc).map(([k,v])=>{
      const pct=Math.round(Math.min(100,v/TOTALS[k]*100));
      const hi=pct>=60?'high':'';
      return`<div class="score-bar-row">
        <span class="sbl">${LABELS[k]}</span>
        <div class="sbt"><div class="sbf ${hi}" style="width:${pct}%"></div></div>
        <span class="sbv">${pct}%</span>
      </div>`;
    }).join('');
    const pkP=PKGS[p],pkA=PKGS[alt];
    body.innerHTML=`
      <div class="result-wrap">
        <p class="result-intro">根據你的回答，以下是你各面向的健康需求強度分析：</p>
        <div class="score-section">
          <div class="score-title">你的健康需求分析</div>
          ${bars}
        </div>
        <hr class="divider">
        <div class="reco-title">為你推薦的套組</div>
        <div class="reco-sub">依據評估結果，為你配對最適合的冠軍生醫套組</div>
        <div class="pkg-card top">
          <div class="pkg-hdr"><span class="badge-top">主要推薦</span><span class="pkg-name">${pkP.name}</span></div>
          <div class="pkg-why top">${WHY_P[p]}</div>
          <div class="prod-lbl">包含產品</div>
          <div class="prods">${pkP.prods.map(x=>`<span class="prod-chip">${x}</span>`).join('')}</div>
          <div class="pkg-tip">${pkP.tip}</div>
          <a class="cta-a top" href="${pkP.url}" target="_blank">了解 ${pkP.name} →</a>
        </div>
        <div class="pkg-card">
          <div class="pkg-hdr"><span class="badge-alt">次要推薦</span><span class="pkg-name">${pkA.name}</span></div>
          <div class="pkg-why alt">${WHY_A[alt]}</div>
          <div class="prod-lbl">包含產品</div>
          <div class="prods">${pkA.prods.map(x=>`<span class="prod-chip">${x}</span>`).join('')}</div>
          <div class="pkg-tip">${pkA.tip}</div>
          <a class="cta-a alt" href="${pkA.url}" target="_blank">了解 ${pkA.name} →</a>
        </div>
        <div class="share-row">
          <button class="share-btn line" onclick="shareToLine()">分享給朋友</button>
          <button class="share-btn copy" onclick="copyLink()">複製連結</button>
        </div>
        <button class="retry-btn" onclick="restart()">重新評估</button>
      </div>`;
    return;
  }
  const q=QS[cur];
  const pct=Math.round(cur/QS.length*100);
  body.innerHTML=`
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-meta"><span>${SECS[q.s]}</span><span>${cur+1} / ${QS.length}</span></div>
    </div>
    <div class="sec-chip">${SECS[q.s]}</div>
    <div class="q-text">${q.q}</div>
    <div class="opts">
      ${q.opts.map((o,i)=>`
        <button type="button" class="opt${ans[cur]===i?' sel':''}" onclick="pick(${i})">
          <span class="opt-dot"></span>
          <span>${o[0]}</span>
        </button>`).join('')}
    </div>
    <div class="nav">
      <button class="btn-back" onclick="go(-1)" ${cur===0?'disabled':''}>上一題</button>
      <button class="btn-next" onclick="go(1)" ${ans[cur]===null?'disabled':''}>${cur===QS.length-1?'查看我的套組推薦':'下一題'}</button>
    </div>`;
}

function pick(i){ans[cur]=i;render();}
function go(d){if(d===1&&ans[cur]===null)return;cur=Math.max(0,cur+d);render();}
function restart(){cur=0;ans=new Array(QS.length).fill(null);render();}
function shareToLine(){const url=encodeURIComponent(location.href);window.open('https://social-plugins.line.me/lineit/share?url='+url,'_blank');}
function copyLink(){navigator.clipboard&&navigator.clipboard.writeText(location.href).then(()=>alert('連結已複製！'));}
render();
</script>
</body>
</html>
