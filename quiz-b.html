let cur=0;
let ans=QS.map(q=>q.multi?[]:null);

function calcScores(){
  let sc={gut:0,slim:0,energy:0,sleep:0,beauty:0,daily:0};
  for(let i=0;i<QS.length;i++){
    const q=QS[i];
    if(q.multi){
      ans[i].forEach(idx=>{
        const w=q.opts[idx][1];
        Object.keys(sc).forEach(k=>sc[k]+=w[k]||0);
      });
    } else {
      if(ans[i]===null) continue;
      const w=q.opts[ans[i]][1];
      Object.keys(sc).forEach(k=>sc[k]+=w[k]||0);
    }
  }
  return sc;
}

function recommend(sc){
  const{gut,slim,energy,sleep,beauty,daily}=sc;
  const ps={
    dailyA:gut*1.8+energy*1.5+sleep*0.8+daily*0.5,
    dailyB:gut*1.5+slim*0.8+energy*1.0+daily*1.2,
    slimA:slim*1.8+energy*1.2+daily*0.8,
    slimB:slim*1.5+gut*1.5+daily*0.8,
    beauty:beauty*2.5+sleep*1.0+energy*0.3
  };
  const sorted=Object.entries(ps).sort((a,b)=>b[1]-a[1]);
  return[sorted[0][0],sorted[1][0]];
}

function getNeedTags(sc){
  const map={
    gut:"飲食順暢型",
    slim:"日常活力型",
    energy:"元氣補充型",
    sleep:"放鬆舒眠型",
    beauty:"光采亮妍型",
    daily:"均衡日常型"
  };
  const sorted=Object.entries(sc)
    .filter(([k,v])=>v>0)
    .sort((a,b)=>b[1]-a[1]);
  if(sorted.length===0) return["全方位均衡型"];
  const top=sorted.slice(0,2).filter((item,idx)=>{
    if(idx===0) return true;
    return item[1]>=sorted[0][1]*0.7;
  });
  return top.map(([k])=>map[k]);
}

function isReady(){
  const q=QS[cur];
  if(q.multi) return ans[cur].length>0;
  return ans[cur]!==null;
}

function render(){
  const body=document.getElementById('body');
  if(cur===QS.length){
    const sc=calcScores();
    const[p,alt]=recommend(sc);
    const tags=getNeedTags(sc);
    const pkP=PKGS[p],pkA=PKGS[alt];
    body.innerHTML=`
      <div class="result-wrap">

          <div class="prod-lbl">套組包含</div>
          <div class="prods">${pkA.prods.map(x=>`<span class="prod-chip">${x}</span>`).join('')}</div>
          <div class="pkg-tip">${pkA.tip}</div>
          <a class="cta-a alt" href="${pkA.url}" target="_blank">了解 ${pkA.name} →</a>
        </div>
        <div class="share-row">
          <button class="share-btn line" onclick="shareToLine()">分享給朋友</button>
          <button class="share-btn copy" onclick="copyLink()">複製連結</button>
        </div>
        <button class="retry-btn" onclick="restart()">重新填寫</button>
      </div>`;
    return;
  }

  const q=QS[cur];
  const pct=Math.round(cur/QS.length*100);

  const optsHtml=q.opts.map((o,i)=>{
    const isSel=q.multi?ans[cur].includes(i):ans[cur]===i;
    const icon=q.multi
      ?`<span class="opt-sq">${isSel?'✓':''}</span>`
      :`<span class="opt-dot"></span>`;
    return`<button type="button" class="opt${isSel?' sel':''}" onclick="pick(${i})">${icon}<span>${o[0]}</span></button>`;
  }).join('');

  body.innerHTML=`
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-meta"><span>${secLabel(q)}</span><span>${cur+1} / ${QS.length}</span></div>
    </div>
    <div class="sec-chip">${secLabel(q)}</div>
    <div class="q-text">${q.q}</div>
    ${q.hint?`<div class="q-hint">${q.hint}</div>`:''}
    <div class="opts">${optsHtml}</div>
    <div class="nav">
      <button class="btn-back" onclick="go(-1)" ${cur===0?'disabled':''}>上一題</button>
      <button class="btn-next" onclick="go(1)" ${isReady()?'':'disabled'}>${cur===QS.length-1?'查看推薦套組':'下一題'}</button>
    </div>`;
}

function pick(i){
  const q=QS[cur];
  if(q.multi){
    const noneIdx=q.opts.findIndex(o=>o[0]==='沒吃過');
    if(i===noneIdx){
      ans[cur]=[noneIdx];
    } else {
      ans[cur]=ans[cur].filter(x=>x!==noneIdx);
      if(ans[cur].includes(i)) ans[cur]=ans[cur].filter(x=>x!==i);
      else ans[cur].push(i);
    }
  } else {
    ans[cur]=i;
  }
  render();
}

function go(d){
  if(d===1&&!isReady()) return;
  cur=Math.max(0,cur+d);
  render();
}
function restart(){cur=0;ans=QS.map(q=>q.multi?[]:null);render();}
function shareToLine(){const url=encodeURIComponent(location.href);window.open('https://social-plugins.line.me/lineit/share?url='+url,'_blank');}
function copyLink(){if(navigator.clipboard){navigator.clipboard.writeText(location.href).then(()=>alert('連結已複製！'));}}
render();
